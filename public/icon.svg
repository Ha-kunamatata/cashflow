<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.01"/>
    </linearGradient>
    <clipPath id="bounds">
      <rect width="512" height="512" rx="115"/>
    </clipPath>
    <!-- Soft drop shadow for badges -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="rgba(0,0,0,0.18)"/>
    </filter>
  </defs>

  <!-- White background -->
  <rect width="512" height="512" rx="115" fill="#f8faff"/>

  <!-- Subtle dot-grid texture -->
  <g clip-path="url(#bounds)" opacity="0.07">
    <line x1="0" y1="171" x2="512" y2="171" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="5 10"/>
    <line x1="0" y1="341" x2="512" y2="341" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="5 10"/>
  </g>

  <!-- Area fill under chart -->
  <path d="M178 375 C230 375 248 272 288 252 C328 232 348 286 388 260 C414 244 432 196 460 168 L460 440 L178 440 Z"
        fill="url(#areaGrad)" clip-path="url(#bounds)"/>

  <!-- Chart line -->
  <path d="M178 375 C230 375 248 272 288 252 C328 232 348 286 388 260 C414 244 432 196 460 168"
        stroke="url(#lineGrad)" stroke-width="19" fill="none"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Mid data dots -->
  <circle cx="288" cy="252" r="8" fill="#3b82f6" opacity="0.6"/>
  <circle cx="388" cy="260" r="8" fill="#6366f1" opacity="0.6"/>

  <!-- Red − badge: bottom-left (expense) -->
  <circle cx="116" cy="396" r="72" fill="#ef4444" filter="url(#shadow)"/>
  <!-- inner glow -->
  <circle cx="116" cy="396" r="72" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="3"/>
  <!-- − symbol -->
  <line x1="84" y1="396" x2="148" y2="396" stroke="white" stroke-width="18" stroke-linecap="round"/>

  <!-- Green + badge: top-right (income) -->
  <circle cx="396" cy="116" r="72" fill="#22c55e" filter="url(#shadow)"/>
  <!-- inner glow -->
  <circle cx="396" cy="116" r="72" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="3"/>
  <!-- + symbol -->
  <line x1="364" y1="116" x2="428" y2="116" stroke="white" stroke-width="18" stroke-linecap="round"/>
  <line x1="396" y1="84"  x2="396" y2="148" stroke="white" stroke-width="18" stroke-linecap="round"/>
</svg>

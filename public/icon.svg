<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c1d3e"/>
      <stop offset="60%" stop-color="#1a3a6b"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="areaGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="bounds">
      <rect width="512" height="512" rx="115"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="115" fill="url(#bgGrad)"/>

  <!-- Subtle grid lines -->
  <g clip-path="url(#bounds)" opacity="0.06">
    <line x1="0" y1="170" x2="512" y2="170" stroke="white" stroke-width="1.5"/>
    <line x1="0" y1="290" x2="512" y2="290" stroke="white" stroke-width="1.5"/>
    <line x1="0" y1="410" x2="512" y2="410" stroke="white" stroke-width="1.5"/>
  </g>

  <!-- Area fill under chart line -->
  <path d="M72 360 C130 360 148 272 204 248 C260 224 282 292 340 258 C380 234 420 172 448 148 L448 460 L72 460 Z"
        fill="url(#areaGrad)" clip-path="url(#bounds)"/>

  <!-- Main chart line -->
  <path d="M72 360 C130 360 148 272 204 248 C260 224 282 292 340 258 C380 234 420 172 448 148"
        stroke="url(#lineGrad)" stroke-width="22" fill="none"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Glowing dot at current (end) point -->
  <circle cx="448" cy="148" r="28" fill="#4f46e5" fill-opacity="0.35"/>
  <circle cx="448" cy="148" r="16" fill="#818cf8"/>
  <circle cx="448" cy="148" r="8" fill="white"/>

  <!-- Up arrow above dot -->
  <path d="M430 124 L448 102 L466 124"
        stroke="white" stroke-width="14" fill="none"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Small data dots on the line -->
  <circle cx="204" cy="248" r="8" fill="#60a5fa" opacity="0.8"/>
  <circle cx="340" cy="258" r="8" fill="#60a5fa" opacity="0.8"/>
</svg>
